name: test 
 
on: 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: setup 
      uses: actions/checkout@v4

    - name: Download file with wget
      run: |
          wget -O get-cookies.txt-locally_v0.7.2_chrome.zip \
          "https://github.com/kairi003/Get-cookies.txt-LOCALLY/releases/download/v0.7.2/get-cookies.txt-locally_v0.7.2_chrome.zip"


    - name: Commit and push
      run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add get-cookies.txt-locally_v0.7.2_chrome.zip
          git diff --staged --quiet || git commit -m "Add downloaded zip file"
          git push  
          
      

