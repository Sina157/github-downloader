name: Download and Commit File

on:
  workflow_dispatch:  # اجرای دستی

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download file
        run: |
          curl -L -o get-cookies.txt-locally_v0.7.2_chrome.zip \
          "https://github.com/kairi003/Get-cookies.txt-LOCALLY/releases/download/v0.7.2/get-cookies.txt-locally_v0.7.2_chrome.zip"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add get-cookies.txt-locally_v0.7.2_chrome.zip
          git diff --staged --quiet || git commit -m "Download extension zip"
          git push
